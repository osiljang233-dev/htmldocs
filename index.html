<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>문서 목록 — HTML Docs</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --border: #2e3150;
  --accent: #7c6af7; --text: #e8eaf0; --text3: #5c6080;
  --green: #68d391; --orange: #f6ad55; --radius: 8px;
}
body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.75; min-height: 100vh; }
.wrap { max-width: 720px; margin: 0 auto; padding: 60px 32px; }
.eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
h1 { font-size: 28px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.sub { font-size: 13px; color: var(--text3); margin-bottom: 40px; }
.section-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.doc-list { list-style: none; margin-bottom: 40px; }
.doc-item { display: flex; align-items: center; gap: 16px; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; text-decoration: none; transition: border-color 0.15s, background 0.15s; }
.doc-item:hover { border-color: var(--accent); background: rgba(124,106,247,0.05); }
.doc-icon { font-size: 20px; flex-shrink: 0; }
.doc-info { flex: 1; }
.doc-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.doc-meta { font-size: 12px; color: var(--text3); }
.doc-arrow { font-size: 14px; color: var(--text3); }
.doc-item:hover .doc-arrow { color: var(--accent); }
.tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-left: 6px; }
.tag-plan { background: rgba(124,106,247,0.15); color: var(--accent); border: 1px solid rgba(124,106,247,0.3); }
.tag-report { background: rgba(246,173,85,0.1); color: var(--orange); border: 1px solid rgba(246,173,85,0.3); }
.tag-unknown { background: rgba(92,96,128,0.2); color: var(--text3); border: 1px solid var(--border); }
.loading { font-size: 13px; color: var(--text3); padding: 20px 0; }
.footer { font-size: 12px; color: var(--text3); border-top: 1px solid var(--border); padding-top: 20px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="eyebrow">HTML DOCS · osiljang233-dev</div>
  <h1>문서 목록</h1>
  <p class="sub">업무 진행 내용 및 회의 결과 · 최신순</p>

  <div class="section-title">기획 문서</div>
  <ul class="doc-list" id="doc-list">
    <li class="loading">문서 목록 불러오는 중...</li>
  </ul>

  <div class="footer">HTML Docs · 2026 · CONFIDENTIAL</div>

</div>

<script>
// 파일명 → 메타 매핑 (새 파일 올릴 때 여기만 추가)
const meta = {
  'naming-report-20260715.html':      { title: '슬롯 커뮤니티 브랜드 네이밍 분석 보고서', icon: '🏷️', tag: 'report', desc: '붐슬롯 · 핫슬롯 · 슬롯크루 · 슬롯그램 · 히트슬롯 TOP5 분석' },
  'slot-planning-20260715.html':      { title: '슬롯 커뮤니티 기획서', icon: '🎰', tag: 'plan', desc: 'SEO 전략 · 차별화 기능 · 이벤트 · 유저 경험' },
  'seo-alert-report-20260713.html':   { title: '구글이 잡아내는 것들 — 2026 최신 경보', icon: '⚠️', tag: 'report', desc: '알고리즘 타임라인 · E-E-A-T · 블랙햇 비교표 · 실전 체크리스트' },
  'lineage-adena-report-20260713.html': { title: '리니지 클래식 이해 & 아데나 거래 시장 분석', icon: '⚔️', tag: 'report', desc: '아데나 경제 구조 · 거래 플랫폼 · 시세 · 이용자 특성' },
  'hermes-agent-mlb-20260713.html':    { title: 'Hermes Agent — MLB 콘텐츠 완전 자동화 시스템', icon: '🤖', tag: 'report', desc: 'AI 직원 5명 · 15분 완성 · 데이터 수집~영상 제작 풀 자동화' },
};

const tagLabel = { plan: '기획', report: '보고서', unknown: '문서' };

function parseDate(filename) {
  const m = filename.match(/(\d{4})(\d{2})(\d{2})/);
  return m ? `${m[1]}.${m[2]}.${m[3]}` : '';
}

function parseSortKey(filename) {
  const m = filename.match(/(\d{8})/);
  return m ? m[1] : '0';
}

async function loadDocs() {
  const list = document.getElementById('doc-list');
  try {
    const res = await fetch('https://api.github.com/repos/osiljang233-dev/htmldocs/contents/');
    const files = await res.json();

    // index.html 제외하고 .html 파일만
    let htmlFiles = files
      .filter(f => f.name.endsWith('.html') && f.name !== 'index.html')
      .sort((a, b) => parseSortKey(b.name).localeCompare(parseSortKey(a.name)));

    list.innerHTML = '';

    if (htmlFiles.length === 0) {
      list.innerHTML = '<li class="loading">문서가 없습니다.</li>';
      return;
    }

    htmlFiles.forEach(f => {
      const m = meta[f.name] || { title: f.name.replace('.html',''), icon: '📄', tag: 'unknown', desc: '' };
      const date = parseDate(f.name);
      const li = document.createElement('li');
      li.innerHTML = `
        <a class="doc-item" href="./${f.name}">
          <div class="doc-icon">${m.icon}</div>
          <div class="doc-info">
            <div class="doc-title">${m.title} <span class="tag tag-${m.tag}">${tagLabel[m.tag] || '문서'}</span></div>
            <div class="doc-meta">${date}${m.desc ? ' · ' + m.desc : ''}</div>
          </div>
          <div class="doc-arrow">→</div>
        </a>
      `;
      list.appendChild(li);
    });

  } catch (e) {
    list.innerHTML = '<li class="loading">목록을 불러오지 못했습니다.</li>';
  }
}

loadDocs();
</script>
</body>
</html>
